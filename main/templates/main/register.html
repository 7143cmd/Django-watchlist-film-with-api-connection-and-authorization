{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 bg-dark text-white" style="width: 350px;">

        <h3 class="text-center mb-4">Register</h3>

        <input type="text" class="form-control mb-3" placeholder="Username">
        <input type="email" class="form-control mb-3" placeholder="Email">
        <input type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-success btn-block mb-3">Register</button>

        <div class="text-center">
            <span class="text-muted">Already have an account?</span>
            <a href="{% url 'login' %}" class="text-primary">Login</a>
        </div>

    </div>
</div>

{% endblock %}
