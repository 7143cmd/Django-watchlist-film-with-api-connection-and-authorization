{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container-fluid">
    <div class="row min-vh-100">

        <div class="col-10 bg-secondary text-white">

            <div class="d-flex justify-content-between align-items-center p-4">

                <form id="searchForm" class="w-50">
                    <input 
                        type="text" 
                        id="searchInput"
                        class="form-control" 
                        placeholder="Search movies..."
                    >
                </form>

                <script>
                document.getElementById('searchForm').addEventListener('submit', function(e) {
                    e.preventDefault();

                    const query = document.getElementById('searchInput').value;

                    if (query) {
                        window.location.href = `/search/${query}/`;
                    }
                });
                </script>

                <div class="text-right pr-5">
                    <h3 class="mb-0">Latest movies from Watchlist</h3>

                    
                        <ul class="list-unstyled mt-3">
                            
                                {% for item in watchlist %}
                                    <li class="mb-2">
                                        <div class="d-flex justify-content-between align-items-center">

                                            <img src="{{ item.image }}" width="100">

                                            <span>{{ item.title }}</span>

                                            <div>
                                                <a href="https://www.imdb.com/title/{{ item.id }}/" 
                                                target="_blank"
                                                class="btn btn-outline-light btn-sm">
                                                    Details
                                                </a>

                                                <button 
                                                    class="btn btn-outline-warning btn-sm add-to-watchlist"
                                                    data-movie-id="{{ item.id }}"
                                                >
                                                    {% if item.id in watchlist_ids %}
                                                        ✅
                                                    {% else %}
                                                        🔖
                                                    {% endif %}
                                                </button>
                                            </div>

                                        </div>
                                    </li>
                                {% endfor %}
                        </ul>
                </div>

            </div>

            <div class="p-4">

            </div>

        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            document.cookie.split(';').forEach(cookie => {
                const [key, value] = cookie.trim().split('=');
                if (key === name) cookieValue = decodeURIComponent(value);
            });
        }
        return cookieValue;
    }

    document.querySelectorAll('.add-to-watchlist').forEach(button => {
        button.addEventListener('click', function () {

            const movieId = this.dataset.movieId;

            fetch("{% url 'add_to_watchlist' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: new URLSearchParams({
                    movie_id: movieId
                })
            })
            .then(res => res.json())
            .then(data => {

                if (data.status === "added") {
                    this.innerText = "✅";
                } 
                else if (data.status === "removed") {
                    this.innerText = "🔖";
                } 
                else {
                    alert("Error");
                }

            });
        });
    });

});
</script>
{% endblock %}
