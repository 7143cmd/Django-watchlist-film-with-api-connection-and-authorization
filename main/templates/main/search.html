{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">
    <div class="row">

        <!-- 🎬 Main Content -->
        <div class="col-md-10 p-4">

            <!-- 🔎 Search bar -->
            <form id="searchForm" class="w-50 h-80">
                <input 
                    type="text" 
                    id="searchInput"
                    class="form-control" 
                    placeholder="Search movies..."
                >
            </form>

            <script>
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();

                const query = document.getElementById('searchInput').value;

                if (query) {
                    window.location.href = `/search/${query}/`;
                }
            });
            </script>

            <!-- 🎞 Grid -->
            <div class="row">

                <!-- 🔹 Movie Card -->
                {% for movie in results %}
                    <div class="col-xl-3 col-lg-4 col-md-6 mb-4">
                        <div class="card bg-dark text-white h-100">

                            <div class="card-body">
                                <img src="{{ movie.primaryImage.url }}" class="card-img-top">
                                <h5>{{ movie.primaryTitle }}</h5>

                                <p>{{ movie.startYear }}</p>

                                <p>
                                    ⭐ {{ movie.rating.aggregateRating }}
                                </p>

                                <div class="d-flex justify-content-between">
                                    <a href="https://www.imdb.com/title/{{ movie.id }}/" 
                                    target="_blank"
                                    class="btn btn-outline-light btn-sm">
                                        Details
                                    </a>

                                    <button 
                                        class="btn btn-outline-warning btn-sm add-to-watchlist"
                                        data-movie-id="{{ movie.id }}"
                                    >
                                        {% if movie.id in watchlist_ids %}
                                            ✅
                                        {% else %}
                                            🔖
                                        {% endif %}
                                    </button>
                                </div>

                            </div>

                        </div>
                    </div>
                {% endfor %}

            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            document.cookie.split(';').forEach(cookie => {
                const [key, value] = cookie.trim().split('=');
                if (key === name) cookieValue = decodeURIComponent(value);
            });
        }
        return cookieValue;
    }

    document.querySelectorAll('.add-to-watchlist').forEach(button => {
        button.addEventListener('click', function () {

            const movieId = this.dataset.movieId;

            fetch("{% url 'add_to_watchlist' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: new URLSearchParams({
                    movie_id: movieId
                })
            })
            .then(res => res.json())
            .then(data => {

                if (data.status === "added") {
                    this.innerText = "✅";
                } 
                else if (data.status === "removed") {
                    this.innerText = "🔖";
                } 
                else {
                    alert("Error");
                }

            });
        });
    });

});
</script>
{% endblock %}
